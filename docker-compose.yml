# =============================================================================
# Portfolio 3D - Docker Compose
# =============================================================================
# Usage:
#   Build: docker compose build
#   Start: docker compose up -d
#   Stop:  docker compose down
#   Logs:  docker compose logs -f
# =============================================================================

services:
  portfolio:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SENTRY_AUTH_TOKEN: ${SENTRY_AUTH_TOKEN:-}
        SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-production}
        SENTRY_FRONTEND_PROJECT: ${SENTRY_FRONTEND_PROJECT:-}
        SENTRY_ORG: ${SENTRY_ORG:-}
        SENTRY_RELEASE: ${SENTRY_RELEASE:-ape-prod-portfolio@1.0.0}
    image: portfolio-3d:${TAG:-latest}
    container_name: portfolio-3d
    restart: unless-stopped
    ports:
      - "80:80"
    networks:
      global_cloudflared:
        ipv4_address: 10.25.10.6
      backend:
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
        reservations:
          cpus: '0.1'
          memory: 64M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    depends_on:
      leaderboard:
        condition: service_started

  leaderboard:
    build:
      context: .
      dockerfile: Dockerfile.leaderboard
      args:
        SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-production}
        SENTRY_RELEASE: ${SENTRY_RELEASE:-ape-prod-portfolio@1.0.0}
    image: portfolio-leaderboard:${TAG:-latest}
    container_name: portfolio-leaderboard
    restart: unless-stopped
    expose:
      - "8080"
    environment:
      NODE_ENV: production
      SENTRY_ENABLE_TEST_ENDPOINTS: ${SENTRY_ENABLE_TEST_ENDPOINTS:-0}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-production}
      SENTRY_RELEASE: ${SENTRY_RELEASE:-ape-prod-portfolio@1.0.0}
    networks:
      - backend
    volumes:
      - leaderboard-data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
      
networks:
  global_cloudflared:
    external: true
  backend:
    driver: bridge

volumes:
  leaderboard-data:
